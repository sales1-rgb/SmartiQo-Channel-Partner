<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartiQo Link Diagnostic Test</title>
    <style>
        body { font-family: sans-serif; background-color: #111112; color: #FFFFFF; padding: 30px; text-align: center; }
        .btn { display: block; background: #8CC0DA; color: #2F2E31; padding: 20px; margin: 15px auto; max-width: 300px; border-radius: 10px; text-decoration: none; font-weight: bold; font-size: 1.1rem; border: none; cursor: pointer; }
        .msg { color: #8A8983; font-size: 0.9rem; margin-top: 5px; }
    </style>
</head>
<body>
    <h2>SmartiQo Link Diagnostic Test</h2>
    <p>We are going to find out exactly why your phone blocks these folders. Tap each button below on your phone:</p>

    <!-- TEST 1: STANDARD LINK WITH SYSTEM BREAKOUT -->
    <a class="btn" href="https://google.com" target="_top">Test 1: Top Breakout Link</a>
    <div class="msg">Tests standard redirection.</div>

    <!-- TEST 2: ANDROID DEEP INTENT SCHEMA -->
    <button class="btn" onclick="triggerAndroid()">Test 2: Android Native App Link</button>
    <div class="msg">Forces Android to open the native Drive App.</div>

    <!-- TEST 3: IOS DEEP SCHEMA -->
    <button class="btn" onclick="triggerIOS()">Test 3: iOS Native App Link</button>
    <div class="msg">Forces iPhone to open the native Drive App.</div>

    <script>
        function triggerAndroid() {
            window.location.href = 'intent://://google.com';
        }
        function triggerIOS() {
            window.location.href = 'googledrive://open?folderId=1ooR5lPIMCmZM37amzeA0oD6waJ7EDWnU';
        }
    </script>
</body>
</html>
